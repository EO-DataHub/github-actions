name: Publish image to AWS public ECR

on:
  workflow_call:
    inputs:
      IMAGE_NAME:
        description: Name of image
        required: true
        type: string
      IMAGE_TAG:
        description: "Optional tag override. When provided, used as the sole Docker image tag. When omitted, tags are auto-generated from git refs."
        required: false
        type: string
        default: ''
      AWS_ROLE_ARN:
        description: AWS role ARN e.g. arn:aws:iam::1234567890:role/role-name
        required: true
        type: string
      AWS_ECR_ALIAS:
        description: AWS ECR alias, e.g. a1b2c3d4
        required: true
        type: string
      BUILD_CONTEXT:
        description: Docker build context path
        required: false
        type: string
        default: '.'
      BUILD_ARGS:
        description: Optional Docker build args (multiline KEY=VALUE, one per line)
        required: false
        type: string
        default: ''
      cleanup:
        description: Run storage optimizer before build (frees disk space)
        required: false
        type: boolean
        default: false

    outputs:
      tags:
        description: Generated Docker image tags
        value: ${{ jobs.docker.outputs.tags }}
      labels:
        description: Generated Docker image labels
        value: ${{ jobs.docker.outputs.labels }}

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta-auto.outputs.tags || steps.meta-override.outputs.tags }}
      labels: ${{ steps.meta-auto.outputs.labels || steps.meta-override.outputs.labels }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ inputs.AWS_ROLE_ARN }}
          aws-region: us-east-1 # This is the region for the public ECR

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Check ECR registry
        run: echo ${{ steps.login-ecr-public.outputs.registry }}/${{ inputs.AWS_ECR_ALIAS }}

      - name: Docker metadata (auto-generated tags)
        id: meta-auto
        if: inputs.IMAGE_TAG == ''
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr-public.outputs.registry }}/${{ inputs.AWS_ECR_ALIAS }}/${{ inputs.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            # main branch -> "latest"
            type=raw,value=latest,enable={{is_default_branch}}
            # versioned tags (v1.0.0) -> "1.0.0" (strip v prefix)
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # pull requests -> source branch name (e.g., "feature-branch")
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}
            # other refs -> ref name as-is
            type=ref,event=branch,enable=${{ github.ref_name != 'main' && !startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/v') }}

      - name: Docker metadata (explicit tag)
        id: meta-override
        if: inputs.IMAGE_TAG != ''
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr-public.outputs.registry }}/${{ inputs.AWS_ECR_ALIAS }}/${{ inputs.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ inputs.IMAGE_TAG }}

      - name: Storage optimize
        if: ${{ inputs.cleanup }}
        uses: .github/actions/storage-optimizer@main

      # This will cache Docker layers.
        # We could also cache the cache mounts used in the Dockerfile but do not,
        # see https://docs.docker.com/build/ci/github-actions/cache/
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.BUILD_CONTEXT }}
          push: true
          tags: ${{ steps.meta-auto.outputs.tags || steps.meta-override.outputs.tags }}
          labels: ${{ steps.meta-auto.outputs.labels || steps.meta-override.outputs.labels }}
          build-args: |
            GIT_REF_NAME=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
            ${{ inputs.BUILD_ARGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
