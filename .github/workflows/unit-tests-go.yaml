name: Unit tests

on:
  workflow_call:

jobs:
  unit-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up go
        uses: actions/setup-go@bfdd3570ce990073878bf10f6b2d79082de49492 # v2

      - name: run tests
        run: |
          go test -v -cover ./...
