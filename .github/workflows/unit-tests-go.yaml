name: Unit tests

on:
  workflow_call:

jobs:
  unit-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6

      - name: run tests
        run: |
          go test -v -cover ./...
