name: Unit tests

on:
  workflow_call:

jobs:
  unit-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6

      - name: run tests
        run: |
          go test -v -cover ./...
