name: Go-Build
on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version"
        required: false
        type: string
        default: "1.22"
      golangci-lint-version:
        description: "GolangCI Lint version"
        required: false
        type: string
        default: "v2.1.0"
      coverage-threshold-file:
        description: "Coverage threshold for a single file"
        required: false
        type: number
        default: 80
      coverage-threshold-package:
        description: "Coverage threshold for a package"
        required: false
        type: number
        default: 80
      coverage-threshold-total:
        description: "Coverage threshold for the total coverage"
        required: false
        type: number
        default: 95
permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go-version }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: ${{ inputs.golangci-lint-version }}
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs.go-version }}
      - name: Install dependencies
        run: |
          go mod download
          go install github.com/ctrf-io/go-ctrf-json-reporter/cmd/go-ctrf-json-reporter@latest
      - name: Test with Go (with coverage report)
        id: test
        run: go test -coverprofile cover.out -json ./... | tee test.out
      - name: Display test results
        run: |
          cat test.out | go-ctrf-json-reporter -output ctrf-report.json
          npx github-actions-ctrf ctrf-report.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cover.out
          path: cover.out
      - name: Check test results
        run: |
          cat ctrf-report.json | jq '.results.summary' > summary.json
          cat summary.json
          if [ $(jq '.failed' summary.json) -gt 0 ]; then
            echo "Tests failed"
            exit 1
          else
            echo "Tests passed"
          fi
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cover.out
      - uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5
        with:
          name: cover.out
      - name: Check test coverage
        uses: vladopajic/go-test-coverage@b7a53f8889e7246b7af7ad84e96a7c9704bf01fb # v2
        with:
          profile: cover.out
          local-prefix: github.com/org/project
          threshold-file: ${{ inputs.coverage-threshold-file }}
          threshold-package: ${{ inputs.coverage-threshold-package }}
          threshold-total: ${{ inputs.coverage-threshold-total }}
